<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch the Heart 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #1a1a2e;
    font-family: Arial;
    color: white;
    text-align: center;
}

#player {
    position: absolute;
    bottom: 20px;
    left: 50%;
    width: 80px;
    height: 20px;
    background: pink;
    transform: translateX(-50%);
}

.heart {
    position: absolute;
    font-size: 24px;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
}

#gameOver {
    position: absolute;
    top: 40%;
    width: 100%;
    font-size: 30px;
    display: none;
}
</style>
</head>

<body>

<div id="score">Score: 0</div>
<div id="gameOver">Game Over 💔</div>
<div id="player"></div>

<script>
let player = document.getElementById("player");
let score = 0;
let misses = 0;
let gameOver = false;

// Move player
document.addEventListener("mousemove", (e) => {
    player.style.left = e.clientX + "px";
});

// Create hearts
function spawnHeart() {
    if (gameOver) return;

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "-30px";
    document.body.appendChild(heart);

    let fall = setInterval(() => {
        if (gameOver) {
            clearInterval(fall);
            heart.remove();
            return;
        }

        let top = parseInt(heart.style.top);
        heart.style.top = top + 5 + "px";

        let rect1 = heart.getBoundingClientRect();
        let rect2 = player.getBoundingClientRect();

        // Catch
        if (
            rect1.bottom > rect2.top &&
            rect1.left < rect2.right &&
            rect1.right > rect2.left
        ) {
            score++;
            document.getElementById("score").innerText = "Score: " + score;
            heart.remove();
            clearInterval(fall);
        }

        // Miss
        if (top > window.innerHeight) {
            misses++;
            heart.remove();
            clearInterval(fall);

            if (misses >= 5) {
                gameOver = true;
                document.getElementById("gameOver").style.display = "block";
            }
        }
    }, 30);
}

setInterval(spawnHeart, 800);
</script>

</body>
</html>
